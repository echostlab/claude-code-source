name: claudecode

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to run in CI
        required: false
        type: string

concurrency:
  group: claudecode-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
      run_kind: ${{ steps.detect.outputs.run_kind }}
      prompt: ${{ steps.detect.outputs.prompt }}
      pr_number: ${{ steps.detect.outputs.pr_number }}
      issue_number: ${{ steps.detect.outputs.issue_number }}
      has_pr_context: ${{ steps.detect.outputs.has_pr_context }}
    steps:
      - id: detect
        name: Detect event and build prompt
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || '' }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          ISSUE_AUTHOR_ASSOCIATION: ${{ github.event.issue.author_association || '' }}
          ISSUE_AUTHOR_LOGIN: ${{ github.event.issue.user.login || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association || '' }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login || '' }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association || '' }}
          COMMENT_AUTHOR_LOGIN: ${{ github.event.comment.user.login || '' }}
          ALLOWED_ASSOCIATIONS: OWNER,MEMBER,COLLABORATOR
          ALLOWED_SLASH_ACTORS: ${{ vars.CLAUDECODE_ALLOWED_SLASH_ACTORS || vars.OPENCODE_ALLOWED_SLASH_ACTORS || '' }}
          WORKFLOW_PROMPT: ${{ inputs.prompt || '' }}
        run: |
          set -euo pipefail

          SHOULD_RUN="false"
          RUN_KIND="none"
          PROMPT=""
          HAS_PR_CONTEXT="false"

          trim() {
            local v="$1"
            v="${v#"${v%%[![:space:]]*}"}"
            v="${v%"${v##*[![:space:]]}"}"
            printf '%s' "$v"
          }

          csv_contains() {
            local csv_list="$1"
            local probe="$2"
            local normalized_probe="${probe//[[:space:]]/}"
            local candidate=""

            normalized_probe="${normalized_probe,,}"
            IFS=',' read -r -a _items <<< "$csv_list"
            for candidate in "${_items[@]}"; do
              candidate="${candidate//[[:space:]]/}"
              candidate="${candidate,,}"
              if [[ "$candidate" == "$normalized_probe" ]]; then
                return 0
              fi
            done
            return 1
          }

          is_trusted_actor() {
            local association="${1^^}"
            local login="${2,,}"

            if csv_contains "$ALLOWED_ASSOCIATIONS" "$association"; then
              return 0
            fi
            if [[ -n "$login" ]] && csv_contains "$ALLOWED_SLASH_ACTORS" "$login"; then
              return 0
            fi
            return 1
          }

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            HAS_PR_CONTEXT="true"
            if is_trusted_actor "$PR_AUTHOR_ASSOCIATION" "$PR_AUTHOR_LOGIN"; then
              SHOULD_RUN="true"
              RUN_KIND="auto_pr_review"
              BODY_TRIMMED="$(trim "${PR_BODY:-}")"
              if [[ -n "$BODY_TRIMMED" ]]; then
                PROMPT="Review this pull request in detail. Focus on correctness, regressions, security, and test gaps.\n\nPR title: ${PR_TITLE}\n\nPR description:\n${PR_BODY}"
              else
                PROMPT="Review this pull request in detail. Focus on correctness, regressions, security, and test gaps. PR title: ${PR_TITLE}."
              fi
            else
              echo "::notice title=ClaudeCode::Ignoring untrusted PR author '$PR_AUTHOR_LOGIN' ($PR_AUTHOR_ASSOCIATION)"
            fi
          elif [[ "$EVENT_NAME" == "issues" ]]; then
            if is_trusted_actor "$ISSUE_AUTHOR_ASSOCIATION" "$ISSUE_AUTHOR_LOGIN"; then
              SHOULD_RUN="true"
              RUN_KIND="issue_task"
              BODY_TRIMMED="$(trim "${ISSUE_BODY:-}")"
              if [[ -n "$BODY_TRIMMED" ]]; then
                PROMPT="$ISSUE_BODY"
              else
                PROMPT="$ISSUE_TITLE"
              fi
            else
              echo "::notice title=ClaudeCode::Ignoring untrusted issue author '$ISSUE_AUTHOR_LOGIN' ($ISSUE_AUTHOR_ASSOCIATION)"
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            SHOULD_RUN="true"
            RUN_KIND="manual_workflow"
            PROMPT="$WORKFLOW_PROMPT"
          elif [[ "$EVENT_NAME" == "issue_comment" || "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            if [[ "$EVENT_NAME" == "pull_request_review_comment" || "$IS_PR_COMMENT" == "true" ]]; then
              HAS_PR_CONTEXT="true"
            fi
            FIRST_TOKEN="$(printf '%s' "$COMMENT_BODY" | sed -nE 's/^[[:space:]]*(\/[A-Za-z0-9_-]+).*$/\1/p' | head -n 1)"
            COMMAND="${FIRST_TOKEN#/}"
            COMMAND="${COMMAND,,}"

            if [[ "$COMMAND" == "oc" || "$COMMAND" == "opencode" || "$COMMAND" == "claude" ]]; then
              if ! is_trusted_actor "$COMMENT_AUTHOR_ASSOCIATION" "$COMMENT_AUTHOR_LOGIN"; then
                echo "::notice title=ClaudeCode::Ignoring slash command from untrusted actor '$COMMENT_AUTHOR_LOGIN' ($COMMENT_AUTHOR_ASSOCIATION)"
              else
                SHOULD_RUN="true"
                if [[ "$EVENT_NAME" == "pull_request_review_comment" || "$IS_PR_COMMENT" == "true" ]]; then
                  RUN_KIND="manual_pr_review"
                else
                  RUN_KIND="issue_task"
                fi

                PROMPT="$(printf '%s' "$COMMENT_BODY" | sed -E '1s/^[[:space:]]*\/[A-Za-z0-9_-]+[[:space:]]*//')"
                PROMPT="$(trim "$PROMPT")"
              fi
            fi
          fi

          echo "::notice title=ClaudeCode::Event '$EVENT_NAME' -> should_run=$SHOULD_RUN, run_kind=$RUN_KIND"

          OUTPUT_DELIM="CLAUDECODE_$(date +%s)_$RANDOM_$RANDOM"
          {
            echo "should_run=$SHOULD_RUN"
            echo "run_kind=$RUN_KIND"
            echo "pr_number=$PR_NUMBER"
            echo "issue_number=$ISSUE_NUMBER"
            echo "has_pr_context=$HAS_PR_CONTEXT"
            echo "prompt<<$OUTPUT_DELIM"
            echo "$PROMPT"
            echo "$OUTPUT_DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Claude Code trigger"
            echo "- event: \`$EVENT_NAME\`"
            echo "- should_run: \`$SHOULD_RUN\`"
            echo "- run_kind: \`$RUN_KIND\`"
            echo "- mode: \`$([[ "$RUN_KIND" == "issue_task" ]] && echo implementation || echo review)\`"
          } >> "$GITHUB_STEP_SUMMARY"

  claudecode-implement:
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true' && needs.detect-trigger.outputs.run_kind == 'issue_task' && needs.detect-trigger.outputs.has_pr_context != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      baseurl: ${{ vars.CLAUDECODE_BASE_URL || vars.OPENCODE_BASE_URL || vars.BASEURL || vars.baseurl || 'https://openslab-resource.openai.azure.com/openai/v1' }}
      BASEURL: ${{ vars.CLAUDECODE_BASE_URL || vars.OPENCODE_BASE_URL || vars.BASEURL || vars.baseurl || 'https://openslab-resource.openai.azure.com/openai/v1' }}
      CLAUDECODE_BASE_URL: ${{ vars.CLAUDECODE_BASE_URL || vars.OPENCODE_BASE_URL || vars.BASEURL || vars.baseurl || 'https://openslab-resource.openai.azure.com/openai/v1' }}
      modelid: ${{ vars.CLAUDECODE_MODEL_ID || vars.OPENCODE_MODEL_ID || vars.MODEL_ID || vars.modelid || vars.model || 'gpt-5.3-codex' }}
      MODEL_ID: ${{ vars.CLAUDECODE_MODEL_ID || vars.OPENCODE_MODEL_ID || vars.MODEL_ID || vars.modelid || vars.model || 'gpt-5.3-codex' }}
      model: ${{ vars.CLAUDECODE_MODEL_ID || vars.OPENCODE_MODEL_ID || vars.MODEL_ID || vars.modelid || vars.model || 'gpt-5.3-codex' }}
      apiVersion: ${{ vars.CLAUDECODE_API_VERSION || vars.OPENCODE_API_VERSION || vars.API_VERSION || vars.APIVERSION || vars.apiVersion || '' }}
      API_VERSION: ${{ vars.CLAUDECODE_API_VERSION || vars.OPENCODE_API_VERSION || vars.API_VERSION || vars.APIVERSION || vars.apiVersion || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve branch and PR automation context
        id: gitctx
        shell: bash
        env:
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
          HAS_PR_CONTEXT: ${{ needs.detect-trigger.outputs.has_pr_context }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          SHOULD_AUTOMATE_PR="false"
          if [[ "$RUN_KIND" == "issue_task" && "$HAS_PR_CONTEXT" != "true" ]]; then
            SHOULD_AUTOMATE_PR="true"
          fi

          SAFE_ISSUE="${ISSUE_NUMBER:-manual}"
          BRANCH_NAME="claudecode/issue-${SAFE_ISSUE}-${GITHUB_RUN_ID}-a${RUN_ATTEMPT}"

          {
            echo "should_automate_pr=$SHOULD_AUTOMATE_PR"
            echo "base_branch=$DEFAULT_BRANCH"
            echo "branch_name=$BRANCH_NAME"
          } >> "$GITHUB_OUTPUT"

          echo "::notice title=ClaudeCode::Context resolved (run_kind=$RUN_KIND, has_pr_context=$HAS_PR_CONTEXT, should_automate_pr=$SHOULD_AUTOMATE_PR, branch=$BRANCH_NAME)"
          {
            echo "## Claude Code git context"
            echo "- should_automate_pr: \`$SHOULD_AUTOMATE_PR\`"
            echo "- base_branch: \`$DEFAULT_BRANCH\`"
            echo "- target_branch: \`$BRANCH_NAME\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create working branch for implementation
        if: steps.gitctx.outputs.should_automate_pr == 'true'
        shell: bash
        env:
          BRANCH_NAME: ${{ steps.gitctx.outputs.branch_name }}
        run: |
          set -euo pipefail
          git checkout -B "$BRANCH_NAME"
          echo "::notice title=ClaudeCode::Created implementation branch '$BRANCH_NAME'"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build project
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Build"
          npm run build
          echo "::notice title=ClaudeCode::Build completed"
          echo "::endgroup::"

      - name: Configure Foundry runtime env
        shell: bash
        run: |
          set -euo pipefail
          first_non_empty() {
            local value=""
            for value in "$@"; do
              if [[ -n "${value:-}" ]]; then
                printf '%s' "$value"
                return 0
              fi
            done
            return 1
          }

          RESOLVED_BASEURL="$(first_non_empty "${CLAUDECODE_BASE_URL:-}" "${BASEURL:-}" "${baseurl:-}" "https://openslab-resource.openai.azure.com/openai/v1")"
          RESOLVED_MODELID="$(first_non_empty "${MODEL_ID:-}" "${modelid:-}" "${model:-}" "gpt-5.3-codex")"
          RESOLVED_APIVERSION="$(first_non_empty "${API_VERSION:-}" "${apiVersion:-}" "")"

          {
            echo "CLAUDECODE_FOUNDRY_BASE_URL=$RESOLVED_BASEURL"
            echo "CLAUDECODE_FOUNDRY_MODEL_ID=$RESOLVED_MODELID"
            echo "CLAUDECODE_FOUNDRY_API_VERSION=$RESOLVED_APIVERSION"
          } >> "$GITHUB_ENV"

          echo "::notice title=ClaudeCode::Foundry env prepared (base_url=$RESOLVED_BASEURL, model=$RESOLVED_MODELID, api_version=${RESOLVED_APIVERSION:-default})"

      - name: Build effective prompt
        id: prompt
        shell: bash
        env:
          INPUT_PROMPT: ${{ needs.detect-trigger.outputs.prompt }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
          SHOULD_AUTOMATE_PR: ${{ steps.gitctx.outputs.should_automate_pr }}
          TARGET_BRANCH: ${{ steps.gitctx.outputs.branch_name }}
          BASE_BRANCH: ${{ steps.gitctx.outputs.base_branch }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
        run: |
          set -euo pipefail

          EFFECTIVE_PROMPT="$INPUT_PROMPT"
          if [[ -z "${EFFECTIVE_PROMPT//[[:space:]]/}" ]]; then
            EFFECTIVE_PROMPT="Please analyze the current repository state and provide actionable recommendations."
          fi

          if [[ "$RUN_KIND" == "issue_task" && "$SHOULD_AUTOMATE_PR" == "true" ]]; then
            CONTEXT_SUFFIX="$(printf '\n\nWorkflow context:\n- You are implementing issue #%s in CI.\n- Work on branch '\''%s'\'' (base '\''%s'\'').\n- Make concrete repository changes that satisfy the issue.\n- If possible, commit and open/update a PR to '\''%s'\''.\n- If you cannot open the PR directly, leave changes committed in the current branch for workflow fallback automation.' "$ISSUE_NUMBER" "$TARGET_BRANCH" "$BASE_BRANCH" "$BASE_BRANCH")"
            EFFECTIVE_PROMPT="${EFFECTIVE_PROMPT}${CONTEXT_SUFFIX}"
          fi

          DELIM="CLAUDECODE_PROMPT_$(date +%s)_$RANDOM"
          {
            echo "effective_prompt<<$DELIM"
            echo "$EFFECTIVE_PROMPT"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          echo "::notice title=ClaudeCode::Effective prompt prepared (run_kind=$RUN_KIND, auto_pr=$SHOULD_AUTOMATE_PR)"

      - name: Run Claude Code
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          apiKey: ${{ secrets.CLAUDECODE_API_KEY || secrets.OPENCODE_API_KEY || secrets.AZURE_OPENAI_API_KEY || secrets.AZURE_API_KEY || secrets.API_KEY || secrets.apiKey || '' }}
          API_KEY: ${{ secrets.CLAUDECODE_API_KEY || secrets.OPENCODE_API_KEY || secrets.AZURE_OPENAI_API_KEY || secrets.AZURE_API_KEY || secrets.API_KEY || secrets.apiKey || '' }}
          AZURE_API_KEY: ${{ secrets.CLAUDECODE_API_KEY || secrets.OPENCODE_API_KEY || secrets.AZURE_OPENAI_API_KEY || secrets.AZURE_API_KEY || secrets.API_KEY || secrets.apiKey || '' }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
          CLAUDE_PROMPT: ${{ steps.prompt.outputs.effective_prompt }}
        run: |
          set -euo pipefail
          echo "::group::Claude Code"

          if [[ -z "${API_KEY:-}" && -z "${apiKey:-}" ]]; then
            echo "::error title=ClaudeCode::Missing Foundry API key (apiKey/API_KEY secret)"
            exit 1
          fi

          RESOLVED_APIKEY="${API_KEY:-${apiKey:-}}"
          RESOLVED_BASEURL="${CLAUDECODE_FOUNDRY_BASE_URL:-${CLAUDECODE_BASE_URL:-${BASEURL:-${baseurl:-}}}}"
          RESOLVED_MODELID="${CLAUDECODE_FOUNDRY_MODEL_ID:-${MODEL_ID:-${modelid:-${model:-}}}}"
          RESOLVED_APIVERSION="${CLAUDECODE_FOUNDRY_API_VERSION:-${API_VERSION:-${apiVersion:-}}}"

          export CLAUDE_CODE_USE_FOUNDRY=1
          export ANTHROPIC_FOUNDRY_BASE_URL="$RESOLVED_BASEURL"
          export ANTHROPIC_FOUNDRY_API_KEY="$RESOLVED_APIKEY"
          export ANTHROPIC_MODEL="$RESOLVED_MODELID"
          if [[ -n "$RESOLVED_APIVERSION" ]]; then
            export ANTHROPIC_FOUNDRY_API_VERSION="$RESOLVED_APIVERSION"
          fi

          echo "::notice title=ClaudeCode::Running mode '$RUN_KIND'"
          node ./bin/claude-code-source --print --output-format text "$CLAUDE_PROMPT" | tee claudecode-output.txt
          echo "::endgroup::"

      - name: Commit, push branch, and create/update PR
        if: success() && steps.gitctx.outputs.should_automate_pr == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.gitctx.outputs.branch_name }}
          BASE_BRANCH: ${{ steps.gitctx.outputs.base_branch }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "::notice title=ClaudeCode::No file changes detected; skipping commit/PR automation"
            {
              echo "## Claude Code PR automation"
              echo "- result: no changes to commit"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "::notice title=ClaudeCode::No staged changes after git add; skipping"
            exit 0
          fi

          COMMIT_MESSAGE="feat: resolve issue #${ISSUE_NUMBER} via Claude Code"
          git commit -m "$COMMIT_MESSAGE"

          gh auth setup-git
          git push origin "HEAD:${BRANCH_NAME}"

          EXISTING_PR_NUMBER="$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' || true)"
          PR_TITLE="feat: resolve issue #${ISSUE_NUMBER}"
          PR_BODY="Automated implementation for #${ISSUE_NUMBER} generated by Claude Code CI."

          if [[ -n "$EXISTING_PR_NUMBER" && "$EXISTING_PR_NUMBER" != "null" ]]; then
            gh pr edit "$EXISTING_PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
            PR_URL="$(gh pr view "$EXISTING_PR_NUMBER" --json url --jq '.url')"
            echo "::notice title=ClaudeCode::Updated PR #$EXISTING_PR_NUMBER -> $PR_URL"
          else
            PR_URL="$(gh pr create --base "$BASE_BRANCH" --head "$BRANCH_NAME" --title "$PR_TITLE" --body "$PR_BODY")"
            echo "::notice title=ClaudeCode::Created PR -> $PR_URL"
          fi

          gh issue comment "$ISSUE_NUMBER" --body "🤖 Implementación en curso completada. PR creado/actualizado: $PR_URL"

          {
            echo "## Claude Code PR automation"
            echo "- branch: \`$BRANCH_NAME\`"
            echo "- base: \`$BASE_BRANCH\`"
            echo "- pr: $PR_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish run summary
        if: always()
        shell: bash
        env:
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
        run: |
          set -euo pipefail
          {
            echo "## Claude Code run"
            echo "- run_kind: \`$RUN_KIND\`"
            echo "- workflow: \`${{ github.workflow }}\`"
            echo "- run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "### Output (first lines)"
            if [[ -f claudecode-output.txt ]]; then
              sed -n '1,80p' claudecode-output.txt
            else
              echo "No output file generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  claudecode-review:
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true' && !(needs.detect-trigger.outputs.run_kind == 'issue_task' && needs.detect-trigger.outputs.has_pr_context != 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read

    env:
      baseurl: ${{ vars.CLAUDECODE_BASE_URL || vars.OPENCODE_BASE_URL || vars.BASEURL || vars.baseurl || 'https://openslab-resource.openai.azure.com/openai/v1' }}
      BASEURL: ${{ vars.CLAUDECODE_BASE_URL || vars.OPENCODE_BASE_URL || vars.BASEURL || vars.baseurl || 'https://openslab-resource.openai.azure.com/openai/v1' }}
      CLAUDECODE_BASE_URL: ${{ vars.CLAUDECODE_BASE_URL || vars.OPENCODE_BASE_URL || vars.BASEURL || vars.baseurl || 'https://openslab-resource.openai.azure.com/openai/v1' }}
      modelid: ${{ vars.CLAUDECODE_MODEL_ID || vars.OPENCODE_MODEL_ID || vars.MODEL_ID || vars.modelid || vars.model || 'gpt-5.3-codex' }}
      MODEL_ID: ${{ vars.CLAUDECODE_MODEL_ID || vars.OPENCODE_MODEL_ID || vars.MODEL_ID || vars.modelid || vars.model || 'gpt-5.3-codex' }}
      model: ${{ vars.CLAUDECODE_MODEL_ID || vars.OPENCODE_MODEL_ID || vars.MODEL_ID || vars.modelid || vars.model || 'gpt-5.3-codex' }}
      apiVersion: ${{ vars.CLAUDECODE_API_VERSION || vars.OPENCODE_API_VERSION || vars.API_VERSION || vars.APIVERSION || vars.apiVersion || '' }}
      API_VERSION: ${{ vars.CLAUDECODE_API_VERSION || vars.OPENCODE_API_VERSION || vars.API_VERSION || vars.APIVERSION || vars.apiVersion || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build project
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Build"
          npm run build
          echo "::notice title=ClaudeCode::Build completed"
          echo "::endgroup::"

      - name: Configure Foundry runtime env
        shell: bash
        run: |
          set -euo pipefail
          first_non_empty() {
            local value=""
            for value in "$@"; do
              if [[ -n "${value:-}" ]]; then
                printf '%s' "$value"
                return 0
              fi
            done
            return 1
          }

          RESOLVED_BASEURL="$(first_non_empty "${CLAUDECODE_BASE_URL:-}" "${BASEURL:-}" "${baseurl:-}" "https://openslab-resource.openai.azure.com/openai/v1")"
          RESOLVED_MODELID="$(first_non_empty "${MODEL_ID:-}" "${modelid:-}" "${model:-}" "gpt-5.3-codex")"
          RESOLVED_APIVERSION="$(first_non_empty "${API_VERSION:-}" "${apiVersion:-}" "")"

          {
            echo "CLAUDECODE_FOUNDRY_BASE_URL=$RESOLVED_BASEURL"
            echo "CLAUDECODE_FOUNDRY_MODEL_ID=$RESOLVED_MODELID"
            echo "CLAUDECODE_FOUNDRY_API_VERSION=$RESOLVED_APIVERSION"
          } >> "$GITHUB_ENV"

          echo "::notice title=ClaudeCode::Foundry env prepared (base_url=$RESOLVED_BASEURL, model=$RESOLVED_MODELID, api_version=${RESOLVED_APIVERSION:-default})"

      - name: Build effective prompt
        id: prompt
        shell: bash
        env:
          INPUT_PROMPT: ${{ needs.detect-trigger.outputs.prompt }}
        run: |
          set -euo pipefail

          EFFECTIVE_PROMPT="$INPUT_PROMPT"
          if [[ -z "${EFFECTIVE_PROMPT//[[:space:]]/}" ]]; then
            EFFECTIVE_PROMPT="Please analyze the current repository state and provide actionable recommendations."
          fi

          DELIM="CLAUDECODE_PROMPT_$(date +%s)_$RANDOM"
          {
            echo "effective_prompt<<$DELIM"
            echo "$EFFECTIVE_PROMPT"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          echo "::notice title=ClaudeCode::Effective prompt prepared (review mode)"

      - name: Run Claude Code
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          apiKey: ${{ secrets.CLAUDECODE_API_KEY || secrets.OPENCODE_API_KEY || secrets.AZURE_OPENAI_API_KEY || secrets.AZURE_API_KEY || secrets.API_KEY || secrets.apiKey || '' }}
          API_KEY: ${{ secrets.CLAUDECODE_API_KEY || secrets.OPENCODE_API_KEY || secrets.AZURE_OPENAI_API_KEY || secrets.AZURE_API_KEY || secrets.API_KEY || secrets.apiKey || '' }}
          AZURE_API_KEY: ${{ secrets.CLAUDECODE_API_KEY || secrets.OPENCODE_API_KEY || secrets.AZURE_OPENAI_API_KEY || secrets.AZURE_API_KEY || secrets.API_KEY || secrets.apiKey || '' }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
          CLAUDE_PROMPT: ${{ steps.prompt.outputs.effective_prompt }}
        run: |
          set -euo pipefail
          echo "::group::Claude Code"

          if [[ -z "${API_KEY:-}" && -z "${apiKey:-}" ]]; then
            echo "::error title=ClaudeCode::Missing Foundry API key (apiKey/API_KEY secret)"
            exit 1
          fi

          RESOLVED_APIKEY="${API_KEY:-${apiKey:-}}"
          RESOLVED_BASEURL="${CLAUDECODE_FOUNDRY_BASE_URL:-${CLAUDECODE_BASE_URL:-${BASEURL:-${baseurl:-}}}}"
          RESOLVED_MODELID="${CLAUDECODE_FOUNDRY_MODEL_ID:-${MODEL_ID:-${modelid:-${model:-}}}}"
          RESOLVED_APIVERSION="${CLAUDECODE_FOUNDRY_API_VERSION:-${API_VERSION:-${apiVersion:-}}}"

          export CLAUDE_CODE_USE_FOUNDRY=1
          export ANTHROPIC_FOUNDRY_BASE_URL="$RESOLVED_BASEURL"
          export ANTHROPIC_FOUNDRY_API_KEY="$RESOLVED_APIKEY"
          export ANTHROPIC_MODEL="$RESOLVED_MODELID"
          if [[ -n "$RESOLVED_APIVERSION" ]]; then
            export ANTHROPIC_FOUNDRY_API_VERSION="$RESOLVED_APIVERSION"
          fi

          echo "::notice title=ClaudeCode::Running mode '$RUN_KIND'"
          node ./bin/claude-code-source --print --output-format text "$CLAUDE_PROMPT" | tee claudecode-output.txt
          echo "::endgroup::"

      - name: Publish run summary
        if: always()
        shell: bash
        env:
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
        run: |
          set -euo pipefail
          {
            echo "## Claude Code run"
            echo "- run_kind: \`$RUN_KIND\`"
            echo "- workflow: \`${{ github.workflow }}\`"
            echo "- run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "### Output (first lines)"
            if [[ -f claudecode-output.txt ]]; then
              sed -n '1,80p' claudecode-output.txt
            else
              echo "No output file generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
